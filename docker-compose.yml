version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hemra_siirow
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=hemra_siirow
      - SERVER_PORT=8080
      - UPLOAD_BASE_PATH=/app/uploads
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
volumes:
  db_data:
  uploads:
