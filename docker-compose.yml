version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hemra_siirow
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    expose:
      - "8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=hemra_siirow
      - SERVER_PORT=8080
      - UPLOAD_BASE_PATH=/app/uploads
    depends_on:
      - db
    volumes:
      - /srv/hemra-sirow/uploads:/app/uploads

  nginx:
    image: nginx:stable
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/hemra-sirow/uploads:/app/uploads:ro

volumes:
  db_data:
