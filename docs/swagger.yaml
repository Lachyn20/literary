        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.BookResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: List books
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Create a new book. Supports JSON or multipart/form-data with optional
        cover image and PDF upload.
      parameters:
      - description: Title
        in: formData
        name: title
        required: true
        type: string
      - description: Bibliographic info
        in: formData
        name: bibliographic_info
        type: string
      - description: Page count
        in: formData
        name: page_count
        type: integer
      - description: Published year
        in: formData
        name: published_year
        type: integer
      - description: Cover image file
        in: formData
        name: cover
        type: file
      - description: PDF file
        in: formData
        name: pdf
        type: file
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.BookResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Create book
  /api/books/{id}:
    delete:
      description: Delete an existing book by id
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Delete book
    get:
      description: Get a single book by id
      parameters:
      - description: Book ID
        in: path
