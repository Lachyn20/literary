basePath: /
definitions:
  dto.BiographyCreateRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  dto.BiographyResponse:
    properties:
      content:
        type: string
      id:
        type: string
      photo_path:
        type: string
      updated_at:
        type: string
    type: object
  dto.BiographyUpdateRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  dto.BookResponse:
    properties:
      bibliographic_info:
        type: string
      cover_image_path:
        type: string
      created_at:
        type: string
      id:
        type: string
      page_count:
        type: integer
      pdf_path:
        type: string
      published_year:
        type: integer
      title:
        type: string
    type: object
  dto.BroadcastResponse:
    properties:
      broadcast_date:
        type: string
      broadcast_type:
        type: string
      channel_name:
        type: string
      created_at:
        type: string
      file_path:
        type: string
      id:
        type: string
      title:
        type: string
    type: object
  dto.CategoryCreateRequest:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - name
    type: object
  dto.CategoryResponse:
    properties:
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  dto.FilmResponse:
    properties:
      based_on_scenario:
        type: boolean
      created_at:
        type: string
      director:
        type: string
      film_type:
        type: string
      id:
        type: string
      release_year:
        type: integer
      title:
        type: string
      video_path:
        type: string
    type: object
  dto.PersonalLetterResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      letter_date:
        type: string
      scan_image_path:
        type: string
      title:
        type: string
    type: object
  dto.PhotoArchiveResponse:
    properties:
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      image_path:
        type: string
      taken_date:
        type: string
      title:
        type: string
    type: object
  dto.TheatreCreateRequest:
    properties:
      notes:
        type: string
      play_title:
        maxLength: 255
        minLength: 1
        type: string
      premiere_date:
        type: string
      theatre_name:
        type: string
    required:
    - play_title
    type: object
  dto.TheatreResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      notes:
        type: string
      play_title:
        type: string
      premiere_date:
        type: string
      theatre_name:
        type: string
    type: object
  dto.TranslatedByAuthorCreateRequest:
    properties:
      notes:
        type: string
      original_author_name:
        type: string
      original_language:
        type: string
      work_title:
        type: string
    required:
    - original_author_name
    - original_language
    - work_title
    type: object
  dto.TranslatedByAuthorResponse:
    properties:
      id:
        type: string
      notes:
        type: string
      original_author_name:
        type: string
      original_language:
        type: string
      work_title:
        type: string
    type: object
  dto.TranslatedIntoLanguageCreateRequest:
    properties:
      language_name:
        type: string
      notes:
        type: string
      translator_name:
        type: string
      work_title:
        type: string
    required:
    - language_name
    - translator_name
    - work_title
    type: object
  dto.TranslatedIntoLanguageResponse:
    properties:
      id:
        type: string
      language_name:
        type: string
      notes:
        type: string
      translator_name:
        type: string
      work_title:
        type: string
    type: object
  dto.WorkCreateRequest:
    properties:
      audience_type:
        enum:
        - adult
        - children
        type: string
      category_id:
        type: string
      content:
        type: string
      description:
        type: string
      publish_year:
        type: integer
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - audience_type
    - category_id
    - content
    - title
    type: object
  dto.WorkResponse:
    properties:
      audience_type:
        type: string
      category_id:
        type: string
      content:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      publish_year:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  handler.JSONResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for Hemra Şirow literary and biography website
  title: Literary Backend API
  version: "1.0"
paths:
  /api/biography:
    get:
      description: Get the author biography
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BiographyResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Get biography
    post:
      consumes:
      - application/json
      description: Create the initial author biography (only used once, when no biography
        exists yet)
      parameters:
      - description: Biography content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BiographyCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.BiographyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - BearerAuth: []
      summary: Create biography
      tags:
      - biography
    put:
      consumes:
      - application/json
      description: Update the author biography
      parameters:
      - description: Biography content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BiographyUpdateRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BiographyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Update biography
  /api/books:
    get:
      description: List all books
